<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The 200 Club of Hawaii</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      /* Navy scale — dark through light; mid/light names reflect section usage, not strict luminance */
      --navy-dark:   #0a1428;
      --navy:        #0f1e3d;
      --navy-mid:    #1a2744;
      --navy-light:  #162039;
      --navy-border: #2a3a5e;
      --gold:        #c9a84c;
      --red:         #c9284c;
      --text-light:  #d0d8e8;
      --white:       #ffffff;
      --text-muted:  #8fa3cc;
      --text-dim:    #4a5a7e;
    }

    body {
      background: var(--navy);
      color: var(--text-light);
      font-family: Georgia, 'Times New Roman', serif;
      line-height: 1.6;
    }

    .section-label {
      font-family: Arial, Helvetica, sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 4px;
      color: var(--gold);
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    h1, h2, h3 { line-height: 1.2; }
  </style>
</head>

</body>
</html>
